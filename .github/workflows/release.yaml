name: release

on:
  workflow_dispatch:
  release:
    types: [released]

permissions:
  contents: read
  # Required for npm trusted publishing (OIDC) and provenance attestations
  id-token: write

env:
  HYPHEN_PUBLIC_API_KEY: ${{ secrets.HYPHEN_PUBLIC_API_KEY }}
  HYPHEN_API_KEY: ${{ secrets.HYPHEN_API_KEY }}
  HYPHEN_APPLICATION_ID: ${{ secrets.HYPHEN_APPLICATION_ID }}
  HYPHEN_ORGANIZATION_ID: ${{ secrets.HYPHEN_ORGANIZATION_ID }}
  HYPHEN_LINK_DOMAIN: ${{ secrets.HYPHEN_LINK_DOMAIN }}

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

    - name: Use Node.js 22
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 22
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install

    - name: Build
      run: pnpm build

    - name: Testing
      run: pnpm test

    - name: Publish
      # No NPM_TOKEN: pnpm authenticates via OIDC trusted publishing and
      # generates provenance attestations from the OIDC identity.
      # --no-git-checks is required because the release runs from a detached
      # tag checkout rather than a branch.
      run: pnpm publish --provenance --no-git-checks --ignore-scripts
