name: release

on:
  workflow_dispatch:
  release:
    types: [released]

permissions:
  contents: read
  # Required for npm trusted publishing (OIDC) and provenance attestations
  id-token: write

env:
  HYPHEN_PUBLIC_API_KEY: ${{ secrets.HYPHEN_PUBLIC_API_KEY }}
  HYPHEN_API_KEY: ${{ secrets.HYPHEN_API_KEY }}
  HYPHEN_APPLICATION_ID: ${{ secrets.HYPHEN_APPLICATION_ID }}
  HYPHEN_ORGANIZATION_ID: ${{ secrets.HYPHEN_ORGANIZATION_ID }}
  HYPHEN_LINK_DOMAIN: ${{ secrets.HYPHEN_LINK_DOMAIN }}

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Install pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

    - name: Use Node.js 22
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install Dependencies
      run: pnpm install

    - name: Build
      run: pnpm build

    - name: Testing
      run: pnpm test

    # Trusted publishing (OIDC) requires npm CLI >= 11.5.1, which is newer than
    # the version bundled with Node.js 22.
    - name: Update npm
      run: npm install -g npm@latest

    - name: Publish
      # No NPM_TOKEN: authentication is handled via OIDC trusted publishing.
      # Provenance attestations are generated from the OIDC identity.
      run: npm publish --provenance --ignore-scripts
